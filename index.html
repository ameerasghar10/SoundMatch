<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundMatch</title>
<!-- Adding CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
    :root {
    /*Background Gradient Colours */
      --bg-from:     #e8f4f8;
      --bg-mid:      #ede8f8;
      --bg-to:       #e8f8f0;
    /* Card Colours */
      --card:        #ffffff;
      --card-shadow: 0 8px 40px rgba(120, 100, 180, 0.13);
    /* Button Colours */
      --purple:      #a78bfa;
      --purple-dark: #7c3aed;
      --green:       #34d399;
      --green-dark:  #059669;
      --coral:       #fb7185;
      --coral-dark:  #e11d48;
      --teal:        #22d3ee;
      --teal-dark:   #0891b2;
      --gold:        #fbbf24;
    /* Text Colours */
      --text-dark:   #2d2250;
      --text-mid:    #6b5fa6;
      --text-light:  #a89fc8;
    /* Corner Rounding */
      --radius-btn:  28px;
      --radius-card: 28px;
    /* Font with backup */
      --font:        'Nunito', sans-serif;
    }
    /* Removes all the default spacings */
    *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }
    /* The whole page has a background gradient and is centered on the page */
    body {
      font-family: var(--font);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Every screen is hidden by default */
    .screen {
      display: none; /* Hidden by default */
      width: 100%; /* Full width */
      max-width: 520px; /* Maximum width */
      flex-direction: column; /* Stack vertically */
      align-items: center; /* Center horizontally */
      gap: 24px; /* Space between */
      animation: fadeIn 0.3s ease; /* Smooth fade in animation */
    }

    /* Only the active screen is visible */
    .screen.active {
      display: flex; 
    }

    /* Fade in animation when the screen appears */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); } /* Start transparent and move down */
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- SCREEN 1: HOME -->
  <div class="screen active" id="home-screen">
    <h1>🐾 SoundMatch</h1>
    <p>Switch-accessible animal sound game</p>
    <button>🚀 Start Session</button>
    <button>⚙️ Settings</button>
  </div>

  <!-- SCREEN 2: SETTINGS -->
  <div class="screen" id="settings-screen">
    <h2>OT Settings</h2>
    <p>Switch Mode</p>
    <button id="mode-1">1 Switch</button>
    <button id="mode-2">2 Switches</button>
    <p>Difficulty</p>
    <input type="range" min="0" max="2" step="1" value="0" />
    <p>Scanning Speed</p>
    <input type="range" min="0" max="2" step="1" value="1" />
    <p>Volume</p>
    <input type="range" min="0" max="2" step="1" value="1" />
    <input type="checkbox" /> I've confirmed the Pretoria box is set to Space/Enter mode
    <button>✓ Save Settings</button>
  </div>

  <!-- SCREEN 3: GAME (placeholder) -->
  <div class="screen" id="game-screen">
    <h2>Game coming in Stage 2</h2>
    <button>✕ End Session</button>
  </div>

</body>
</html>
