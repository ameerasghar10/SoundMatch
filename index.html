<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundMatch</title>
<!-- Adding CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- Canvas confetti library for correct answer celebration -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
    :root {
    /*Background Gradient Colours */
      --bg-from:     #e8f4f8;
      --bg-mid:      #ede8f8;
      --bg-to:       #e8f8f0;
    /* Card Colours */
      --card:        #ffffff;
      --card-shadow: 0 8px 40px rgba(120, 100, 180, 0.13);
    /* Button Colours */
      --purple:      #a78bfa;
      --purple-dark: #7c3aed;
      --green:       #34d399;
      --green-dark:  #059669;
      --coral:       #fb7185;
      --coral-dark:  #e11d48;
      --teal:        #22d3ee;
      --teal-dark:   #0891b2;
      --gold:        #fbbf24;
    /* Text Colours */
      --text-dark:   #2d2250;
      --text-mid:    #6b5fa6;
      --text-light:  #a89fc8;
    /* Corner Rounding */
      --radius-btn:  28px;
      --radius-card: 28px;
    /* Font with backup */
      --font:        'Nunito', sans-serif;
    }
    /* Removes all the default spacings */
    *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }
    /* The whole page has a background gradient and is centered on the page */
    body {
      font-family: var(--font);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Every screen is hidden by default */
    .screen {
      display: none; /* Hidden by default */
      width: 100%; /* Full width */
      max-width: 520px; /* Maximum width */
      flex-direction: column; /* Stack vertically */
      align-items: center; /* Center horizontally */
      gap: 24px; /* Space between */
      animation: fadeIn 0.3s ease; /* Smooth fade in animation */
    }

    /* Only the active screen is visible */
    .screen.active {
      display: flex; 
    }

    /* Fade in animation when the screen appears */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); } /* Start transparent and move down */
      to   { opacity: 1; transform: translateY(0); }
    }
    /* White rounded card container */
    .screen .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--card-shadow);
      padding: 36px 32px;
      width: 100%;
    }
    /* Logo/title area */
    .screen .logo {
      text-align: center;
    }
    .screen .logo h1 {
      font-size: 42px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: -1px;
    }
     
    .screen .logo p {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-mid);
      margin-top: 4px;
    }
/* The main button style */
.btn {
  font-family: var(--font);
  font-size: 22px;
  font-weight: 800;
  border: none;
  border-radius: var(--radius-btn);
  cursor: pointer;
  padding: 20px 40px;
  /* The actual animation when pressing */
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
  /* The 3D effect needed */
  box-shadow: 0 6px 0 rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.08);
  width: 100%;
  letter-spacing: 0.3px;
}

/* Pressing the button reduces the shadow */
.btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
}

/* When the mouse is hovering, it becomes slighlty brighter */
.btn:hover {
  filter: brightness(1.05);
}

/* The start button */
.btn-start {
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  color: white;
  font-size: 26px;
}

/* The settings button */
.btn-settings {
  background: white;
  color: var(--text-mid);
  border: 2.5px solid var(--purple);
  font-size: 18px;
  padding: 14px 32px;
  box-shadow: 0 4px 0 rgba(167, 139, 250, 0.3);
}

/* The save button */
.btn-save {
  background: linear-gradient(135deg, var(--green), var(--green-dark));
  color: white;
}

/* The end of game button */
.btn-end {
  background: linear-gradient(135deg, var(--coral), var(--coral-dark));
  color: white;
}

/* Adding space between them */
.divider {
  height: 1px;
  background: #f0ebff;
  margin: 24px 0;
}

/* The top of settings */
.settings-topbar {
  display: flex;       
  align-items: center; 
  gap: 12px;           
  width: 100%;
}

/* The back arrow button */
.btn-back {
  background: white;
  border: 2.5px solid var(--purple);
  border-radius: 50%;  
  width: 46px;
  height: 46px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s ease;
  box-shadow: 0 3px 0 rgba(167,139,250,0.3);
}

/* Shrinked when pushed */
.btn-back:active {
  transform: scale(0.92);
}

.settings-topbar h2 {
  font-size: 26px;
  font-weight: 900;
  color: var(--text-dark);
}

/* Each setting section has spacing below it */
.setting-row {
  margin-bottom: 28px;
}

/* The last setting row has no extra space below */
.setting-row:last-child {
  margin-bottom: 0;
}

/* The labels above each slider */
.setting-label {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 12px;
}

/* Switch mode only needs 2 buttons next to eachother */
.switch-mode-group {
  display: grid;
  grid-template-columns: 1fr 1fr; 
  gap: 12px;
}

/* Deafult colour is white */
.mode-btn {
  font-family: var(--font);
  font-size: 17px;
  font-weight: 800;
  padding: 18px 12px;
  border-radius: 20px;
  border: 3px solid #e0d9f5;
  background: white;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.18s ease;
  box-shadow: 0 4px 0 rgba(0,0,0,0.06);
}

.mode-btn:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 rgba(0,0,0,0.06);
}

/* The button turns purple */
.mode-btn.selected {
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  border-color: var(--purple-dark);
  color: white;
  box-shadow: 0 4px 0 rgba(124, 58, 237, 0.4);
}

/* Yellow glowing border shows which button is currently being scanned */
.scanning-highlight {
  box-shadow: 0 0 0 5px #fbbf24, 0 0 20px #fbbf24 !important;
  transform: scale(1.05) !important;
  transition: box-shadow 0.15s ease, transform 0.15s ease !important;
}

/* Wrapper around each slider */
.slider-wrapper {
  position: relative;
  padding: 0 4px;
}

/* The labels on top of the sliders */
.slider-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* Each individual label spaced equally */
.slider-labels span {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-mid);
  flex: 1;
  text-align: center;
}

/* First label is left and last label is right */
.slider-labels span:first-child { text-align: left; }
.slider-labels span:last-child  { text-align: right; }

/* Changes the chrome default styles for sliders */
input[type="range"] {
  -webkit-appearance: none; 
  appearance: none;
  width: 100%;
  height: 10px;
  border-radius: 10px;
  outline: none;
  cursor: pointer;
}

/* Colours for each slider */
.slider-difficulty { background: var(--green); }
.slider-speed      { background: var(--teal); }
.slider-volume     { background: var(--coral); }

/* The draggable selector part of the slider and its colour */
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: white;
  border: 3.5px solid currentColor;
  box-shadow: 0 3px 8px rgba(0,0,0,0.18);
  cursor: grab;
  transition: transform 0.12s ease;
}

/* Like hovering makes it bigger when it's dragged */
input[type="range"]::-webkit-slider-thumb:active {
  cursor: grabbing;
  transform: scale(1.15);
}

/* The borders colours */
.slider-difficulty::-webkit-slider-thumb { border-color: var(--green-dark); }
.slider-speed::-webkit-slider-thumb      { border-color: var(--teal-dark); }
.slider-volume::-webkit-slider-thumb     { border-color: var(--coral-dark); }

/* Showing the actual current value */
.slider-value {
  text-align: center;
  margin-top: 8px;
  font-size: 14px;
  font-weight: 800;
  padding: 4px 14px;
  border-radius: 20px;
  display: inline-block;
  margin-left: 50%;
  transform: translateX(-50%);
}

/* Matches the current value of the slider with the colour of the slider */
.slider-difficulty + .slider-value { background: #d1fae5; color: var(--green-dark); }
.slider-speed      + .slider-value { background: #cffafe; color: var(--teal-dark); }
.slider-volume     + .slider-value { background: #ffe4e6; color: var(--coral-dark); }

/* Red flash animation for incorrect answers */
@keyframes redFlash {
  0%   { background: linear-gradient(135deg, #e8f4f8 0%, #ede8f8 50%, #e8f8f0 100%); }
  30%  { background: #ffe4e6; }
  100% { background: linear-gradient(135deg, #e8f4f8 0%, #ede8f8 50%, #e8f8f0 100%); }
}

.incorrect-flash {
  animation: redFlash 0.8s ease;
}

  </style>
</head>

<body>

  <!-- SCREEN 1: HOME -->
  <div class="screen active" id="home-screen">
    <div class="logo">
        <h1>🐾 SoundMatch</h1>
        <p>Switch-accessible animal sound game</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:14px; width:100%;">
      <button class="btn btn-start" onclick="showScreen('game-screen'); roundNumber=1; startRound();">
        🚀 Start Session
      </button>
      <button class="btn btn-settings" onclick="showScreen('settings-screen')">
        ⚙️ Settings
      </button>
    </div>
  </div>

  <!-- SCREEN 2: SETTINGS -->
  <div class="screen" id="settings-screen">
    <div class="settings-topbar">
      <button class="btn-back" onclick="showScreen('home-screen')">
        🔙
      </button>
      <h2>OT Settings</h2>
    </div>

    <div class="card">

      <div class="setting-row">
        <div class="setting-label">Switch Mode</div>
        <div class="switch-mode-group">
          <button class="mode-btn selected" id="mode-1" onclick="selectMode(1)">1 Switch</button>
          <button class="mode-btn" id="mode-2" onclick="selectMode(2)">2 Switches</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="setting-row">
        <div class="setting-label">Difficulty</div>
        <div class="slider-wrapper">
          <div class="slider-labels">
            <span>Easy</span>
            <span>Medium</span>
            <span>Hard</span>
          </div>
          <input type="range" id="slider-difficulty" class="slider-difficulty"
                 min="0" max="2" step="1" value="0"
                 oninput="updateSlider('difficulty', this.value)" />
          <span class="slider-value" id="val-difficulty">Easy</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="setting-row">
        <div class="setting-label">Scanning Speed</div>
        <div class="slider-wrapper">
          <div class="slider-labels">
            <span>Slow</span>
            <span>Medium</span>
            <span>Fast</span>
          </div>
          <input type="range" id="slider-speed" class="slider-speed"
                 min="0" max="2" step="1" value="1"
                 oninput="updateSlider('speed', this.value)" />
          <span class="slider-value" id="val-speed">Medium</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="setting-row">
        <div class="setting-label">Volume</div>
        <div class="slider-wrapper">
          <div class="slider-labels">
            <span>Quiet</span>
            <span>Normal</span>
            <span>Loud</span>
          </div>
          <input type="range" id="slider-volume" class="slider-volume"
                 min="0" max="2" step="1" value="1"
                 oninput="updateSlider('volume', this.value)" />
          <span class="slider-value" id="val-volume">Normal</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="setting-row">
        <input type="checkbox" /> The Pretoria box is set to Space/Enter mode
      </div>

      <div class="divider"></div>

      <button class="btn btn-save" onclick="saveSettings()">
        ✓ Save Settings
      </button>

    </div>

  </div>

  <!-- SCREEN 3: GAME -->
  <div class="screen" id="game-screen">

    <!-- Top bar showing which round it is and a button to end the session -->
    <!-- Top bar showing round, streak and end button -->
    <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
      <span id="round-counter" style="font-size:18px; font-weight:800; color:#6b5fa6;">Round 1</span>
      <span id="streak-counter" style="font-size:18px; font-weight:800; color:#f59e0b;"></span>
      <button class="btn-back" onclick="endSession()" style="font-size:14px; width:46px; height:46px;">✕</button>
    </div>

    <!-- The animal image — JavaScript swaps this each round -->
    <!-- The blur gradually fades away using a CSS transition -->
    <div style="width:100%; border-radius:24px; overflow:hidden; box-shadow: 0 8px 40px rgba(120,100,180,0.2);">
      <img id="animal-image" src="" alt="Animal" 
           style="width:100%; height:280px; object-fit:cover; display:block; transition: filter 6000ms linear;" />
    </div>

    <!-- The two answer buttons the child presses -->
    <!-- YES = green, NO = red so the child knows which is which -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%;">
      <button class="btn" id="yes-btn" onclick="handleAnswer(true)"
        style="background:linear-gradient(135deg,#34d399,#059669); color:white; font-size:28px; padding:28px;">
        ✓ YES
      </button>
      <button class="btn" id="no-btn" onclick="handleAnswer(false)"
        style="background:linear-gradient(135deg,#fb7185,#e11d48); color:white; font-size:28px; padding:28px;">
        ✗ NO
      </button>
    </div>

    <!-- Message that appears after the child answers — correct or incorrect -->
    <div id="feedback-msg" style="font-size:24px; font-weight:900; text-align:center; min-height:40px; color:#2d2250;"></div>

  </div>

  <script>

    /* For showing the different pages in the game */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(screen) {
        screen.classList.remove('active');});
      document.getElementById(id).classList.add('active');
    }

    /* To store the current settings choices */
    let settings = {
      switchMode: 1,      /* 1 or 2 switches */
      difficulty: 0,      /* 0=Easy, 1=Medium, 2=Hard */
      scanningSpeed: 1,   /* 0=Slow, 1=Medium, 2=Fast */
      volume: 1           /* 0=Quiet, 1=Normal, 2=Loud */
    };

    /* To highlight the chosen switch mode button */
    function selectMode(mode) {
      /* Svaes the choice to the current settings choices above */
      settings.switchMode = mode;
      /* Removes the purple colour from both buttons */
      document.getElementById('mode-1').classList.remove('selected');
      document.getElementById('mode-2').classList.remove('selected');
      /* Only adds purple to the chosen button */
      document.getElementById('mode-' + mode).classList.add('selected');
    }

    /* Keeps the names for each slider position */
    const DIFFICULTY_LABELS = ['Easy', 'Medium', 'Hard'];
    const SPEED_LABELS       = ['Slow', 'Medium', 'Fast'];
    const VOLUME_LABELS      = ['Quiet', 'Normal', 'Loud'];

    /* Slider updates when dragged by WMDLC OT */
    function updateSlider(type, value) {
      /* Change from text to an actual number to use */
      value = parseInt(value);

      if (type === 'difficulty') {
        settings.difficulty = value;
        document.getElementById('val-difficulty').textContent = DIFFICULTY_LABELS[value];
      } else if (type === 'speed') {
        settings.scanningSpeed = value;
        document.getElementById('val-speed').textContent = SPEED_LABELS[value];
      } else if (type === 'volume') {
        settings.volume = value;
        document.getElementById('val-volume').textContent = VOLUME_LABELS[value];
      }
    }

    /* Save current setings to local storage */
    function saveSettings() {
      /* Only text can be saved so needs to be converted */
      localStorage.setItem('soundmatch-settings', JSON.stringify(settings));
      /* Returns to home screen after saving settings */
      showScreen('home-screen');
    }

    /* Running automatically when the website loads */
    window.onload = function() {
      /* Checks previously saved setings */
      const saved = localStorage.getItem('soundmatch-settings');
      /* If saved is not null, there are saved settings */
      if (saved) {
        /* Converts the text back */
        settings = JSON.parse(saved);
        /* Updates everything to the saved settings */
        selectMode(settings.switchMode);
        document.getElementById('slider-difficulty').value = settings.difficulty;
        document.getElementById('slider-speed').value = settings.scanningSpeed;
        document.getElementById('slider-volume').value = settings.volume;
        updateSlider('difficulty', settings.difficulty);
        updateSlider('speed', settings.scanningSpeed);
        updateSlider('volume', settings.volume);
      }
    };

    /* All 10 animals with their image and sound file paths */
    const ANIMALS = [
      { name: 'cow',      image: 'images/cow.jpg',      sound: 'sounds/cow.wav' },
      { name: 'horse',    image: 'images/horse.jpg',    sound: 'sounds/horse.wav' },
      { name: 'sheep',    image: 'images/sheep.jpg',    sound: 'sounds/sheep.mp3' },
      { name: 'dog',      image: 'images/dog.jpg',      sound: 'sounds/dog.wav' },
      { name: 'cat',      image: 'images/cat.jpg',      sound: 'sounds/cat.wav' },
      { name: 'duck',     image: 'images/duck.jpg',     sound: 'sounds/duck.wav' },
      { name: 'pig',      image: 'images/pig.jpg',      sound: 'sounds/pig.wav' },
      { name: 'lion',     image: 'images/lion.jpg',     sound: 'sounds/lion.wav' },
      { name: 'elephant', image: 'images/elephant.jpg', sound: 'sounds/elephant.wav' },
      { name: 'rooster',  image: 'images/rooster.jpg',  sound: 'sounds/rooster.wav' }
    ];

    /* Tracks what's happening in the current round */
    let currentImageAnimal = null;  /* which animal is shown in the image */
    let currentSoundAnimal = null;  /* which animal is playing as sound */
    let roundNumber = 1;            /* which round we're on */
    let soundPlaying = null;        /* the currently playing sound */
    let answerLocked = false;
    let streakCount = 0; /*tracks how many correct answers in a row*/
    let scanningInterval = null; /* the timer that cycles the highlight between YES and NO */
    let scanningIndex = 0;       /* 0 = YES highlighted, 1 = NO highlighted */

    /* Picks a random animal from the list */
    function randomAnimal() {
      return ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
    }

    /* Starts a new round — picks animals, shows image, plays sound */
    function startRound() {
      /* Reset the feedback message and unlock buttons */
      document.getElementById('feedback-msg').textContent = '';
      answerLocked = false;

      /* Update the round counter at the top */
      document.getElementById('round-counter').textContent = 'Round ' + roundNumber;

      /* Pick a random animal for the image */
      currentImageAnimal = randomAnimal();

      /* 50% chance the sound matches the image */
      if (Math.random() < 0.5) {
        /* Matching round — sound is same animal as image */
        currentSoundAnimal = currentImageAnimal;
      } else {
        /* Mismatching round — pick a different animal for sound */
        do {
          currentSoundAnimal = randomAnimal();
        } while (currentSoundAnimal.name === currentImageAnimal.name);
      }

      /* Show the image — apply blur based on difficulty setting */
      const img = document.getElementById('animal-image');
      const blurAmount = [0, 12, 24][settings.difficulty];
      img.style.transition = 'none';
      img.style.filter = 'blur(' + blurAmount + 'px)';
      img.src = currentImageAnimal.image;

      /* After a tiny delay, start the gradual unblur — speed depends on difficulty */
      const unblurTime = [3000, 5000, 8000][settings.difficulty];
      setTimeout(function() {
        img.style.transition = 'filter ' + unblurTime + 'ms linear';
        img.style.filter = 'blur(0px)';
      }, 100);

      /* Stop any previously playing sound */
      if (soundPlaying) {
        soundPlaying.pause();
        soundPlaying.currentTime = 0;
      }

      /* Play the new sound with gradual fade in to avoid startle reflex */
      soundPlaying = new Audio(currentSoundAnimal.sound);
      soundPlaying.volume = 0;
      soundPlaying.play();

      /* Gradually increase volume over 800ms */
      let vol = 0;
      const targetVolume = [0.4, 0.7, 1.0][settings.volume];
      const fadeInterval = setInterval(function() {
        vol += 0.05;
        if (vol >= targetVolume) {
          vol = targetVolume;
          clearInterval(fadeInterval);
        }
        soundPlaying.volume = vol;
      }, 40);
    }

    /* Checks if the child's answer is correct and shows feedback */
    function handleAnswer(childSaidYes) {
      /* Ignore button presses during feedback */
      if (answerLocked) return;
      answerLocked = true;

      /* The correct answer is YES if image and sound match */
      const correctAnswer = (currentImageAnimal.name === currentSoundAnimal.name);
      const isCorrect = (childSaidYes === correctAnswer);

      /* Get the feedback message box */
      const msg = document.getElementById('feedback-msg');

      /* Get the animal name with first letter capitalised */
      const animalName = currentImageAnimal.name.charAt(0).toUpperCase() + currentImageAnimal.name.slice(1);

      if (isCorrect) {
        /* Increase streak and show celebration message with animal name */
        streakCount++;
        msg.textContent = '🎉 Well done! That was a ' + animalName + '!';
        msg.style.color = '#059669';
        launchCelebration();
      } else {
        /* Reset streak and show gentle message with animal name */
        streakCount = 0;
        msg.textContent = '❌ It was a ' + animalName + '! Try again!';
        msg.style.color = '#e11d48';
        document.body.classList.add('incorrect-flash');
        setTimeout(function() { document.body.classList.remove('incorrect-flash'); }, 800);
      }

      /* Update the streak display */
      const streakEl = document.getElementById('streak-counter');
      if (streakCount >= 3) {
        streakEl.textContent = '🔥 ' + streakCount + ' in a row!';
      } else if (streakCount > 0) {
        streakEl.textContent = '⭐ ' + streakCount;
      } else {
        streakEl.textContent = '';
      }

      /* Stop the sound */
      if (soundPlaying) {
        soundPlaying.pause();
        soundPlaying.currentTime = 0;
      }

      /* Wait 2 seconds then start the next round */
      setTimeout(function() {
        roundNumber++;
        startRound();
      }, 2000);
    }

    /* Ends the session and goes back to home screen */
    function endSession() {
      /* Stop any playing sound */
      if (soundPlaying) {
        soundPlaying.pause();
        soundPlaying.currentTime = 0;
      }
      /* Reset round number for next session */
      roundNumber = 1;
      streakCount = 0;
      showScreen('home-screen');
    }

    /* Starts the scanning highlight cycling between YES and NO */
    function startScanning() {
      /* Only scan in 1 switch mode — not needed in 2 switch mode */
      if (settings.switchMode !== 1) return;

      /* Scanning speed — Slow=3000ms, Medium=2000ms, Fast=1000ms */
      const speed = [3000, 2000, 1000][settings.scanningSpeed];
      scanningIndex = 0;

      /* Highlight YES first */
      updateScanHighlight();

      /* Cycle the highlight between YES and NO at the set speed */
      scanningInterval = setInterval(function() {
        scanningIndex = scanningIndex === 0 ? 1 : 0;
        updateScanHighlight();
      }, speed);
    }

    /* Moves the yellow glow to whichever button is currently being scanned */
    function updateScanHighlight() {
      const yesBtn = document.getElementById('yes-btn');
      const noBtn  = document.getElementById('no-btn');

      if (scanningIndex === 0) {
        /* YES is highlighted */
        yesBtn.classList.add('scanning-highlight');
        noBtn.classList.remove('scanning-highlight');
      } else {
        /* NO is highlighted */
        noBtn.classList.add('scanning-highlight');
        yesBtn.classList.remove('scanning-highlight');
      }
    }

    /* Stops scanning and removes the glow from both buttons */
    function stopScanning() {
      clearInterval(scanningInterval);
      scanningInterval = null;
      document.getElementById('yes-btn').classList.remove('scanning-highlight');
      document.getElementById('no-btn').classList.remove('scanning-highlight');
    }

    /* Launches confetti and plays reward sound on correct answer */
    function launchCelebration() {
      const rewardSound = new Audio('sounds/success.wav');
      rewardSound.volume = [0.4, 0.7, 1.0][settings.volume];
      rewardSound.play();

      confetti({
        particleCount: 80,
        angle: 60,
        spread: 55,
        origin: { x: 0, y: 0.3 },
        colors: ['#fbbf24', '#a78bfa', '#34d399', '#fb7185', '#22d3ee']
      });

      confetti({
        particleCount: 80,
        angle: 120,
        spread: 55,
        origin: { x: 1, y: 0.3 },
        colors: ['#fbbf24', '#a78bfa', '#34d399', '#fb7185', '#22d3ee']
      });
    }
    
    /* Listens for keyboard input from the Pretoria switch interface */
    document.addEventListener('keydown', function(event) {
      /* Only listen for keys when the game screen is active */
      if (!document.getElementById('game-screen').classList.contains('active')) return;

      if (event.code === 'Space') {
        /* Left switch / spacebar = YES */
        event.preventDefault(); /* stops page from scrolling on spacebar */
        handleAnswer(true);
      } else if (event.code === 'Enter') {
        /* Right switch / enter = NO */
        handleAnswer(false);
      }
    });

  </script>
