<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundMatch</title>
<!-- Adding CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
    :root {
    /*Background Gradient Colours */
      --bg-from:     #e8f4f8;
      --bg-mid:      #ede8f8;
      --bg-to:       #e8f8f0;
    /* Card Colours */
      --card:        #ffffff;
      --card-shadow: 0 8px 40px rgba(120, 100, 180, 0.13);
    /* Button Colours */
      --purple:      #a78bfa;
      --purple-dark: #7c3aed;
      --green:       #34d399;
      --green-dark:  #059669;
      --coral:       #fb7185;
      --coral-dark:  #e11d48;
      --teal:        #22d3ee;
      --teal-dark:   #0891b2;
      --gold:        #fbbf24;
    /* Text Colours */
      --text-dark:   #2d2250;
      --text-mid:    #6b5fa6;
      --text-light:  #a89fc8;
    /* Corner Rounding */
      --radius-btn:  28px;
      --radius-card: 28px;
    /* Font with backup */
      --font:        'Nunito', sans-serif;
    }
    /* Removes all the default spacings */
    *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }
    /* The whole page has a background gradient and is centered on the page */
    body {
      font-family: var(--font);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Every screen is hidden by default */
    .screen {
      display: none; /* Hidden by default */
      width: 100%; /* Full width */
      max-width: 520px; /* Maximum width */
      flex-direction: column; /* Stack vertically */
      align-items: center; /* Center horizontally */
      gap: 24px; /* Space between */
      animation: fadeIn 0.3s ease; /* Smooth fade in animation */
    }

    /* Only the active screen is visible */
    .screen.active {
      display: flex; 
    }

    /* Fade in animation when the screen appears */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); } /* Start transparent and move down */
      to   { opacity: 1; transform: translateY(0); }
    }
    /* White rounded card container */
    .screen .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--card-shadow);
      padding: 36px 32px;
      width: 100%;
    }
    /* Logo/title area */
    .screen .logo {
      text-align: center;
    }
    .screen .logo h1 {
      font-size: 42px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: -1px;
    }
     
    .screen .logo p {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-mid);
      margin-top: 4px;
    }
/* The main button style */
.btn {
  font-family: var(--font);
  font-size: 22px;
  font-weight: 800;
  border: none;
  border-radius: var(--radius-btn);
  cursor: pointer;
  padding: 20px 40px;
  /* The actual animation when pressing */
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
  /* The 3D effect needed */
  box-shadow: 0 6px 0 rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.08);
  width: 100%;
  letter-spacing: 0.3px;
}

/* Pressing the button reduces the shadow */
.btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
}

/* When the mouse is hovering, it becomes slighlty brighter */
.btn:hover {
  filter: brightness(1.05);
}

/* The start button */
.btn-start {
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  color: white;
  font-size: 26px;
}

/* The settings button */
.btn-settings {
  background: white;
  color: var(--text-mid);
  border: 2.5px solid var(--purple);
  font-size: 18px;
  padding: 14px 32px;
  box-shadow: 0 4px 0 rgba(167, 139, 250, 0.3);
}

/* The save button */
.btn-save {
  background: linear-gradient(135deg, var(--green), var(--green-dark));
  color: white;
}

/* The end of game button */
.btn-end {
  background: linear-gradient(135deg, var(--coral), var(--coral-dark));
  color: white;
}

/* Adding space between them */
.divider {
  height: 1px;
  background: #f0ebff;
  margin: 24px 0;
}

/* The top of settings */
.settings-topbar {
  display: flex;       
  align-items: center; 
  gap: 12px;           
  width: 100%;
}

/* The back arrow button */
.btn-back {
  background: white;
  border: 2.5px solid var(--purple);
  border-radius: 50%;  
  width: 46px;
  height: 46px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s ease;
  box-shadow: 0 3px 0 rgba(167,139,250,0.3);
}

/* Shrinked when pushed */
.btn-back:active {
  transform: scale(0.92);
}

.settings-topbar h2 {
  font-size: 26px;
  font-weight: 900;
  color: var(--text-dark);
}

  </style>
</head>

<body>

  <!-- SCREEN 1: HOME -->
  <div class="screen active" id="home-screen">
    <div class="logo">
        <h1>🐾 SoundMatch</h1>
        <p>Switch-accessible animal sound game</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:14px; width:100%;">
      <button class="btn btn-start">
        🚀 Start Session
      </button>
      <button class="btn btn-settings">
        ⚙️ Settings
      </button>
    </div>
  </div>

  <!-- SCREEN 2: SETTINGS -->
  <div class="screen" id="settings-screen">
    <div class="settings-topbar">
    <button class="btn-back">🔙</button>
    <h2>OT Settings</h2>
    </div>
   
    <p>Switch Mode</p>
    <button id="mode-1">1 Switch</button>
    <button id="mode-2">2 Switches</button>
    <p>Difficulty</p>
    <input type="range" min="0" max="2" step="1" value="0" />
    <p>Scanning Speed</p>
    <input type="range" min="0" max="2" step="1" value="1" />
    <p>Volume</p>
    <input type="range" min="0" max="2" step="1" value="1" />
    <input type="checkbox" /> I've confirmed the Pretoria box is set to Space/Enter mode
    <button>✓ Save Settings</button>
  </div>

  <!-- SCREEN 3: GAME (placeholder) -->
  <div class="screen" id="game-screen">
    <h2>Game coming in Stage 2</h2>
    <button>✕ End Session</button>
  </div>

</body>
</html>
